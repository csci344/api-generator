resources:
  - name: sneakers
    path: /api/sneakers
    operations: [list, retrieve, create, update, delete]
    fields:
      - name: name
        type: string
        required: true
        query: true
      - name: brand
        type: string
        required: true
        query: true
      - name: price
        type: number
        required: true
        query: true
      - name: image_url
        type: image_url
        required: true
      - name: size
        type: integer
        query: true
      - name: condition
        type: string
      - name: is_available
        type: boolean
        query: true
      - name: description
        type: text
    permissions:
      list: public
      retrieve: public
      create: user
      update: owner
      delete: owner

  - name: favorites
    path: /api/favorites
    operations: [list, retrieve, create, update, delete]
    fields:
      - name: note
        type: string
    relations:
      - name: sneaker
        references: sneakers
        required: true
        query: true
    permissions:
      list: owner
      retrieve: owner
      create: user
      update: owner
      delete: owner

  - name: orders
    path: /api/orders
    operations: [list, retrieve, create, update, delete]
    fields:
      - name: customer_name
        type: string
        required: true
      - name: email
        type: string
        required: true
      - name: status
        type: string
        required: true
        query: true
      - name: total
        type: number
        required: true
      - name: created_at
        type: datetime
    relations:
      - name: sneaker
        references: sneakers
        required: true
        query: true
    permissions:
      list: owner
      retrieve: owner
      create: user
      update: owner
      delete: owner