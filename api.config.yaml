resources:
  - name: photos
    path: /api/photos
    operations: [list, retrieve, create, update, delete]
    fields:
      - name: title
        type: string
        required: true
      - name: image_url
        type: string
        required: true
      - name: caption
        type: text
    permissions:
      list: public
      retrieve: public
      create: user
      update: owner
      delete: owner

  - name: comments
    path: /api/comments
    operations: [list, retrieve, create, update, delete]
    fields:
      - name: body
        type: text
        required: true
    relations:
      - name: photo
        references: photos
    permissions:
      list: public
      retrieve: public
      create: user
      update: owner
      delete: owner

  - name: bookmarks
    path: /api/bookmarks
    operations: [list, retrieve, create, update, delete]
    fields:
      - name: note
        type: string
    relations:
      - name: photo
        references: photos
    permissions:
      list: public
      retrieve: public
      create: user
      update: owner
      delete: owner
